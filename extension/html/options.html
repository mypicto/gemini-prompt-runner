<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Runner Settings</title>
    <link rel="stylesheet" href="../css/options.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 data-i18n="optionsTitle">Selector Settings</h1>
            <p data-i18n="optionsDescription">Customize CSS selectors for Google Gemini UI elements</p>
        </header>

        <main>
            <div class="settings-grid" id="settingsGrid">
                <!-- Settings will be dynamically generated here -->
            </div>

            <div class="save-section">
                <button id="saveButton" class="btn btn-primary" data-i18n="saveSettings">Save Settings</button>
                <div id="saveStatus" class="save-status"></div>
            </div>
        </main>
    </div>
    
    <script type="module" src="../js/options.js"></script>
</body>
</html>
